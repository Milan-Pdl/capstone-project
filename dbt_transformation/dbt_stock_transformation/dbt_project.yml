
# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'dbt_stock_transformation'
version: '1.0.0'

# This setting configures which "profile" dbt uses for this project.
profile: 'dbt_stock_transformation'

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

# In this example config, we tell dbt to build all models in the example/
# directory as views. These settings can be overridden in the individual model
# files using the `{{ config(...) }}` macro.
models:
  dbt_stock_transformation:
    # Config indicated by + and applies to all files under models/example/
    staging:
      +materialized: table       # Views are best practice for staging
      +schema: staging           # Will create a schema suffix like '_staging'
    
    # 2. INTERMEDIATE LAYER (Silver)
    intermediate:
      +materialized: table       # Physical tables for transforming heavy data
      +schema: intermediate      # Suffix like '_intermediate' or '_silver'
      
    # 3. MARTS LAYER (Gold / Reporting)
    marts:
          # Configurations applied to everything inside models/marts/
          +enabled: true
          
          dim:
            # Everything in models/marts/dim/ will default to a table
            +materialized: table
            +schema: gold_dim
            
          fct:
                # 1. Start with your defaults for everything inside the 'fct' folder
                +materialized: incremental
                +schema: gold_fct

                # 2. Add your specific overrides for individual subfolders/models
                daily_analysis:
                  +materialized: table
                  +schema: daily_fct

                historical_analysis:
                  +materialized: table
                  +schema: historical_fct
          # snapshots:
#   dbtProject:  # Replace with your actual project name if different
#     +target_schema: gold

packages:
  - package: dbt-labs/dbt_utils
    version: 1.3.0